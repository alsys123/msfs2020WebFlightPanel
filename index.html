<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>MSFS Airspeed Indicator</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="topBar.css">
    
  </head>

  <body>

    <div id="topbar">
      <button class="panel-btn" data-panel="asi">Airspeed</button>
      <button class="panel-btn" data-panel="alt">Altimeter</button>
      <button class="panel-btn" data-panel="hdg">Heading</button>
      
      <button id="testToggle">Test Mode: ON</button>
    </div>

    
    <h2>Airspeed Indicator</h2>
    
    <div id="asi">
      <canvas id="gauge" width="300" height="300"></canvas>
      <!--      <img id="bg" src="images/SpeedGauge172.png"> -->
      <div id="needle"></div>
    </div>
    
    <script src="utils.js"></script>
    <script src="msfsWebPanel.js"></script>
    <script src="c172SpeedGauge.js"></script>


  </body>
</html>
